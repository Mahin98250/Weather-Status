<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weather Status</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<!-- Animated Sky -->
<div class="sky">
    <div class="gradient-bg"></div>

    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>
</div>

<div class="app">

    <!-- HEADER -->
    <header class="header">

        <div>
            <h1 class="app-title">
                Weather
            </h1>
        </div>

        <div class="search-container">

            <input
                type="text"
                id="cityInput"
                placeholder="Search city..."
            >

            <button
                onclick="getWeather()"
                class="search-btn"
            >
                Search
            </button>

            <button
                onclick="getCurrentLocation()"
                class="location-btn"
            >
                📍
            </button>

        </div>

    </header>

    <!-- MAIN WEATHER -->
    <section class="hero glass">

        <div class="city-block">

            <h2 id="cityName">
                Loading...
            </h2>

            <p id="condition">
                Weather Condition
            </p>

        </div>

        <div class="weather-main">

            <div
                id="weatherIcon"
                class="weather-icon"
            >
                ☀️
            </div>

            <div
                id="temperature"
                class="temperature"
            >
                30°
            </div>

            <div
                id="highLow"
                class="high-low"
            >
                H:35° L:25°
            </div>

        </div>

    </section>

    <!-- HOURLY -->
    <section class="glass card">

        <div class="card-title">
            Hourly Forecast
        </div>

        <div
            id="hourlyForecast"
            class="hourly-container"
        >
        </div>

    </section>

    <!-- CHART -->
    <section class="glass card">

        <div class="card-title">
            Temperature Trend
        </div>

        <canvas id="tempChart"></canvas>

    </section>

    <!-- METRICS -->
    <section class="metrics-grid">

        <div class="glass metric-card">
            <span>Humidity</span>
            <h3 id="humidity">--</h3>
        </div>

        <div class="glass metric-card">
            <span>Wind</span>
            <h3 id="wind">--</h3>
        </div>

        <div class="glass metric-card">
            <span>Feels Like</span>
            <h3 id="feelsLike">--</h3>
        </div>

        <div class="glass metric-card">
            <span>UV Index</span>
            <h3 id="uv">--</h3>
        </div>

        <div class="glass metric-card">
            <span>Pressure</span>
            <h3 id="pressure">--</h3>
        </div>

        <div class="glass metric-card">
            <span>Visibility</span>
            <h3 id="visibility">--</h3>
        </div>

    </section>

    <!-- SUN -->
    <section class="metrics-grid">

        <div class="glass metric-card">

            <span>🌅 Sunrise</span>

            <h3 id="sunrise">
                --
            </h3>

        </div>

        <div class="glass metric-card">

            <span>🌇 Sunset</span>

            <h3 id="sunset">
                --
            </h3>

        </div>

    </section>

    <!-- DAILY FORECAST -->
    <section class="glass card">

        <div class="card-title">
            10-Day Forecast
        </div>

        <div
            id="dailyForecast"
            class="daily-container"
        >
        </div>

    </section>

    <!-- AIR QUALITY -->
    <section class="glass card">

        <div class="card-title">
            Air Quality
        </div>

        <div class="air-quality">

            <div
                id="aqiValue"
                class="aqi-number"
            >
                --
            </div>

            <div
                id="aqiText"
                class="aqi-status"
            >
                Loading...
            </div>

        </div>

    </section>

    <!-- LOADING -->
    <div
        id="loading"
        class="loading hidden"
    >
        <div class="loader"></div>
    </div>

    <!-- FOOTER -->
    <footer>

        <p>
            Powered by Open-Meteo
        </p>

    </footer>

</div>

<script src="script.js"></script>

</body>
</html>
